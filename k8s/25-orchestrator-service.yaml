apiVersion: v1
kind: Service
metadata:
  name: moa-orchestrator
  namespace: moa-system
  labels:
    app.kubernetes.io/name: moa-orchestrator
    app.kubernetes.io/part-of: moa
spec:
  selector:
    app.kubernetes.io/name: moa-orchestrator
    app.kubernetes.io/part-of: moa
  ports:
    - name: restate
      port: 9080
      targetPort: restate
    - name: health
      port: 9081
      targetPort: health
    - name: metrics
      port: 9090
      targetPort: metrics
