apiVersion: restate.dev/v1beta1
kind: RestateDeployment
metadata:
  name: moa-orchestrator
  namespace: moa-system
spec:
  replicas: 6
  restate:
    register:
      service:
        name: restate
        namespace: moa-restate
        port: 9070
  selector:
    matchLabels:
      app.kubernetes.io/name: moa-orchestrator
      app.kubernetes.io/part-of: moa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: moa-orchestrator
        app.kubernetes.io/part-of: moa
    spec:
      terminationGracePeriodSeconds: 600
      containers:
        - name: orchestrator
          image: ghcr.io/hwuiwon/moa-orchestrator:latest
          args:
            - --port
            - "9080"
            - --health-port
            - "9081"
          ports:
            - name: restate
              containerPort: 9080
            - name: health
              containerPort: 9081
            - name: metrics
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /_health/ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_health/live
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /_health/live
              port: health
            failureThreshold: 30
            periodSeconds: 10
          env:
            - name: RUST_LOG
              value: info
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: moa-postgres
                  key: url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: moa-llm-keys
                  key: anthropic
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: moa-llm-keys
                  key: openai
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: moa-llm-keys
                  key: openrouter
                  optional: true
            - name: RESTATE_ADMIN_URL
              value: http://restate.moa-restate.svc.cluster.local:9070
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: DEPLOY_ENV
              value: production
            - name: MOA_METRICS_ENABLED
              value: "true"
            - name: MOA_METRICS_LISTEN
              value: 0.0.0.0:9090
            - name: MOA_REQUIRE_RESTATE_REGISTRATION_FOR_READINESS
              value: "false"
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
