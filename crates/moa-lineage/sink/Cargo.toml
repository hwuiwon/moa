[package]
name = "moa-lineage-sink"
version = "0.1.0"
edition = "2024"
license.workspace = true

[dependencies]
blake3 = "1"
chrono.workspace = true
fjall = "3"
metrics.workspace = true
moa-core = { path = "../../moa-core" }
moa-lineage-core = { path = "../core" }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "tls-rustls", "postgres", "chrono", "json", "uuid"] }
thiserror.workspace = true
tokio = { workspace = true, features = ["sync", "rt", "time", "macros"] }
tokio-util.workspace = true
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
tempfile = "3"
