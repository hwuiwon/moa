[package]
name = "moa-memory-vector"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
async-trait.workspace = true
backon = "1"
chrono.workspace = true
moa-core = { path = "../../moa-core" }
pgvector = { version = "0.4.1", features = ["sqlx", "halfvec"] }
reqwest = { workspace = true, features = ["gzip"] }
secrecy = "0.10"
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "tls-rustls", "postgres", "chrono", "uuid", "json"] }
thiserror.workspace = true
tokio.workspace = true
uuid.workspace = true

[dev-dependencies]
moa-session = { path = "../../moa-session" }
