[general]
default_provider = "openai"
default_model = "gpt-5.4"
reasoning_effort = "medium"

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"

[providers.openai]
api_key_env = "OPENAI_API_KEY"

[providers.openrouter]
api_key_env = "OPENROUTER_API_KEY"

[database]
backend = "turso"
url = "~/.moa/sessions.db"
pool_min = 1
pool_max = 5
connect_timeout_secs = 10

[local]
docker_enabled = true
sandbox_dir = "~/.moa/sandbox"
memory_dir = "~/.moa/memory"

[cloud]
enabled = false
turso_url = ""
turso_auth_token_env = "TURSO_AUTH_TOKEN"
turso_sync_interval_secs = 2
# memory_dir = "/data/memory"

[cloud.temporal]
address = ""
namespace = ""
task_queue = "moa-brains"
api_key_env = "TEMPORAL_API_KEY"

[cloud.flyio]
api_token_env = "FLY_API_TOKEN"
app_name = ""
region = "iad"
internal_port = 8080
health_bind = "0.0.0.0"
graceful_shutdown_timeout_secs = 30

[cloud.hands]
default_provider = "daytona"
daytona_api_key_env = "DAYTONA_API_KEY"
e2b_api_key_env = "E2B_API_KEY"

[gateway]
telegram_token_env = "TELEGRAM_BOT_TOKEN"
slack_token_env = "SLACK_BOT_TOKEN"
slack_app_token_env = "SLACK_APP_TOKEN"
discord_token_env = "DISCORD_BOT_TOKEN"

[tui]
theme = "default"
sidebar_auto = true
tab_limit = 8
diff_style = "auto"

[permissions]
default_posture = "approve"
auto_approve = ["file_read", "file_search", "web_search"]
always_deny = []
