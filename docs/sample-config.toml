[general]
default_provider = "openai"
default_model = "gpt-5.4"
reasoning_effort = "medium"
web_search_enabled = true

[models]
main = "gpt-5.4"
auxiliary = "gpt-5.4-mini"

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"

[providers.openai]
api_key_env = "OPENAI_API_KEY"

[providers.google]
api_key_env = "GOOGLE_API_KEY"

[database]
url = "postgres://moa_owner:dev@localhost:5432/moa"
# admin_url = "postgresql://..." # direct/non-pooled URL for migrations and admin flows
max_connections = 20
connect_timeout_seconds = 10

[local]
docker_enabled = true
sandbox_dir = "~/.moa/sandbox"
memory_dir = "~/.moa/memory"

[session]
blob_threshold_bytes = 65536
blob_dir = "~/.moa/blobs"

[observability]
enabled = false
service_name = "moa"
# otlp_endpoint = "http://localhost:4317" # collector gRPC
otlp_protocol = "grpc" # grpc | http
# environment = "development"
# release = "v0.1.0"
sample_rate = 1.0

[observability.lineage]
enabled = false
channel_capacity = 8192
batch_size = 512
batch_max_age_secs = 2
journal_path = "~/.moa/lineage-journal"
sample_pgvector_explain = 0.01

# Custom OTLP headers are useful for direct Langfuse OTLP/HTTP export:
# otlp_protocol = "http"
# otlp_endpoint = "https://cloud.langfuse.com/api/public/otel"
#
# [observability.otlp_headers]
# Authorization = "Basic <base64(public_key:secret_key)>"
# x-langfuse-ingestion-version = "4"

[metrics]
enabled = false
listen = "0.0.0.0:9090"

[cloud]
enabled = false
# memory_dir = "/data/memory"

[cloud.flyio]
api_token_env = "FLY_API_TOKEN"
app_name = ""
region = "iad"
internal_port = 8080
health_bind = "0.0.0.0"
graceful_shutdown_timeout_secs = 30

[cloud.hands]
default_provider = "daytona"
daytona_api_key_env = "DAYTONA_API_KEY"
e2b_api_key_env = "E2B_API_KEY"

[gateway]
telegram_token_env = "TELEGRAM_BOT_TOKEN"
slack_token_env = "SLACK_BOT_TOKEN"
slack_app_token_env = "SLACK_APP_TOKEN"
discord_token_env = "DISCORD_BOT_TOKEN"

[desktop]
theme = "default"
sidebar_auto = true
tab_limit = 8
diff_style = "auto"

[permissions]
default_posture = "approve"
auto_approve = ["file_read", "file_search"]
always_deny = []

[session_limits]
max_turns = 50 # 0 = unlimited
loop_detection_threshold = 3 # 0 = disabled

[tool_output]
max_replay_chars = 20000
max_bash_lines = 200
head_ratio = 0.4

[tool_budgets]
file_read = 8000
bash_stdout = 4000
bash_stderr = 2000
grep = 4000
file_search = 4000
memory_search = 3000
file_outline = 2000
default = 8000

[compaction]
enabled = true
event_threshold = 100
token_ratio_threshold = 0.7
recent_turns_verbatim = 5
preserve_errors = true
tier2_trigger_blocks_past_bp4 = 14
tier3_trigger_fraction = 0.9
max_input_tokens_per_turn = 160000
