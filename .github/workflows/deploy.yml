name: deploy

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hwuiwon/moa-orchestrator

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgres://moa_owner:dev@127.0.0.1:5432/moa
      DATABASE_URL: postgres://moa_owner:dev@127.0.0.1:5432/moa
      POSTGRES_URL: postgres://moa_owner:dev@127.0.0.1:5432/moa
      MOA_RUN_LIVE_PROVIDER_TESTS: "0"
      MOA_PENTEST_REPORT: ${{ github.workspace }}/pentest_report.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Start Postgres AGE test stack
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          for i in {1..60}; do
            if docker compose exec -T postgres pg_isready -U moa_owner -d moa; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs postgres
          exit 1

      - name: Start PII service for nightly pentest
        if: github.event_name == 'schedule'
        run: docker compose up -d moa-pii-service

      - name: Wait for PII service
        if: github.event_name == 'schedule'
        run: |
          for i in {1..120}; do
            if curl -fsS http://127.0.0.1:8080/healthz; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs moa-pii-service
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Audit legacy memory removal
        run: cargo run --locked -p xtask --bin audit_legacy_memory

      - name: Run clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run cross-tenant pentest
        if: github.event_name != 'schedule'
        run: cargo test --locked -p moa-eval --test cross_tenant_pentest -- --nocapture

      - name: Run nightly cross-tenant pentest
        if: github.event_name == 'schedule'
        env:
          MOA_PENTEST_REAL_PII: "1"
          MOA_PII_SERVICE_URL: http://127.0.0.1:8080
          MOA_PENTEST_WORKSPACE_COUNT: "100"
          MOA_PENTEST_FACTS_PER_WORKSPACE: "20"
        run: cargo test --locked -p moa-eval --test cross_tenant_pentest -- --nocapture

      - name: Upload pentest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pentest-report
          path: pentest_report.json
          if-no-files-found: ignore

      - name: Run tests
        run: cargo test --locked

  build-image:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.event_name != 'schedule'
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: echo "image=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_B64}" | base64 --decode > "${HOME}/.kube/config"
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}

      - name: Set image tag in kustomization
        run: |
          kustomize edit set image ghcr.io/hwuiwon/moa-orchestrator=${{ needs.build-image.outputs.image }}
        working-directory: k8s

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/

      - name: Wait for orchestrator pods
        run: |
          kubectl -n moa-system wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=moa-orchestrator \
            --timeout=600s

      - name: Run smoke test
        run: bash k8s/scripts/smoke.sh
